[tool.pytest.ini_options]
testpaths = ["services/assistant/tests"]
asyncio_mode = "auto"
addopts = "-ra --strict-markers"

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["services/assistant/src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC", "S", "RUF"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"services/assistant/tests/**/*.py" = ["S101", "S105", "S106"]
